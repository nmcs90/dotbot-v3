name: pr_context
description: Read a GitHub or Azure DevOps pull request, including description, linked issues, and changed files.
version: 1.0.0
category: kickstart-via-pr

inputSchema:
  type: object
  properties:
    pr_url:
      type: string
      description: Optional GitHub or Azure DevOps pull request URL. If omitted, dotbot auto-detects the PR from the current git branch.
  required: []
  additionalProperties: false

examples:
  - description: Read a GitHub pull request directly
    input:
      pr_url: https://github.com/acme/widgets/pull/42
  - description: Auto-detect the current pull request from git
    input: {}
